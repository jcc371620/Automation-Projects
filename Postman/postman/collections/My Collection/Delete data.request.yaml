$kind: http-request
description: This is a DELETE request, used to delete existing data. A
  successful DELETE request typically returns a 200 OK response.
url: "{{baseUrl}}/delete"
method: DELETE
headers:
  Content-Type: application/json
body:
  type: json
  content: '{"id": "12345"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response body contains data object", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("data");
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 4000
