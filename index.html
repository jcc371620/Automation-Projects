<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijie Chen | Personal Space</title>
    <style>
        /* 保持你的黑白极简样式 */
        body {
            background-color: #000;
            color: #fff;
            font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            padding: 60px 20px;
            max-width: 750px;
            margin: 0 auto;
        }
        
        nav { margin-bottom: 40px; }
        nav a { margin-right: 20px; text-decoration: none; font-size: 0.9rem; color: #888; transition: 0.3s; }
        nav a:hover { color: #fff; }

        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0; }
        .subtitle { color: #666; margin-bottom: 40px; }

        .project-card {
            display: block;
            text-decoration: none !important;
            color: inherit;
            padding: 24px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #222; 
            background-color: #000;
        }

        .project-card:hover {
            transform: translateY(-5px); 
            border-color: #fff;            
            background-color: #0a0a0a;        
        }

        .project-card h4 { margin: 0 0 8px 0; font-size: 1.2rem; }
        .project-card p { margin: 0; font-size: 0.9rem; color: #888; }

        .tag-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-size: 10px; color: #666; background: #111; padding: 2px 10px; border-radius: 4px; border: 1px solid #222; text-transform: uppercase; }

        /* 密码弹窗样式 */
        #password-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .password-box { background: #111; padding: 30px; border: 1px solid #333; text-align: center; border-radius: 8px; }
        .password-box input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; margin: 15px 0; width: 200px; }
        .password-box button { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }

        .footer { margin-top: 80px; font-size: 0.8rem; color: #444; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="password-box">
            <h4>请输入访问密码</h4>
            <input type="password" id="pw-input" placeholder="Password">
            <br>
            <button onclick="checkPassword()">确认</button>
            <button onclick="closeOverlay()" style="background: transparent; color: #888;">取消</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="https://github.com/Automation-Projects" target="_blank">GitHub</a>
        <a href="mailto:jcc371620@gmail.com">Email</a>
        <a href="tel:+86 17701690962">Phone</a>
    </nav>

        <script>
        function openOverlay() { document.getElementById('password-overlay').style.display = 'flex'; }
        function closeOverlay() { 
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('error-msg').innerText = '';
        }
        function checkPassword() {
            var pw = document.getElementById('pw-input').value;
            if (pw === '8888888888') {
                // 注意：请确保 Assets/B2B.pdf 路径和大小写正确
                window.location.href = "./Assets/B2B.pdf";
            } else {
                document.getElementById('error-msg').innerText = '密码错误，请联系作者获取。';
            }
        }
    </script>
